<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if page.title %}<title>{{ page.title }} · {{ site.title }}</title>{% else %}<title>{{ site.title }}</title>{% endif %}
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="current"{% endif %}>About</a>
        <a href="{{ '/publications/' | relative_url }}" {% if page.url == '/publications/' %}class="current"{% endif %}>Publications</a>
        <a href="{{ '/resume/' | relative_url }}" {% if page.url == '/resume/' %}class="current"{% endif %}>Resume</a>
        <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="current"{% endif %}>Blog</a>
      </div>
    </nav>
  </header>

  <main class="container {% if page.wide %}container--wide{% endif %}">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
  </footer>
</body>
</html>
