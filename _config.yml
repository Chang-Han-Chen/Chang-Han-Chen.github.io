# Site settings
title: Chang-Han Chen
description: Theoretical Physics PhD at UC Berkeley. Quantum gravity, holography, and quantum many-body systems.
url: "https://chang-han-chen.github.io"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  auto_ids: true
highlighter: rouge
timezone: America/Los_Angeles

permalink: /blog/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - node_modules
